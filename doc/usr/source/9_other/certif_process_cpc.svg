  <text x="490" y="78" class="serifb" font-size="46">JKind</text>
  <text x="460" y="136" class="serifb" font-size="46">frontend</text>

  <!-- Kind 2 -->
  <rect x="403" y="232" rx="24" ry="24" width="319" height="176" class="round"/>
