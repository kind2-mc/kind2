  <rect x="1468" y="220" rx="26" ry="26" width="312" height="189" class="round"/>
  <path d="M1517 274 L1733 274" fill="none" stroke="#e58700" stroke-width="6"/>
  <path d="M1504 359 L1721 359" fill="none" stroke="#e58700" stroke-width="6"/>
