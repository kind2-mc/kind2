<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1029" viewBox="0 0 2048 1029">
  <defs>
    <style>
      .bg { fill: #ececec; }
      .box { fill: #ececec; stroke: #000; stroke-width: 4; }
      .round { fill: #ececec; stroke: #000; stroke-width: 8; }
      .line { fill: none; stroke: #000; stroke-width: 4; stroke-linecap: square; stroke-linejoin: miter; }
      .dash { fill: none; stroke: #000; stroke-width: 4; stroke-dasharray: 16 14; stroke-linecap: round; stroke-linejoin: miter; }
      .sans { font-family: Arial, Helvetica, sans-serif; fill: #000; font-weight: 400; }
      .serifb { font-family: Georgia, "Times New Roman", serif; fill: #000; font-weight: 700; }
      .serif { font-family: Georgia, "Times New Roman", serif; fill: #000; font-weight: 400; }
    </style>

    <marker id="arrow" viewBox="0 0 12 12" refX="9" refY="6"
        markerWidth="12" markerHeight="12"
        orient="auto" markerUnits="strokeWidth">

        <path d="M2,3 L10,6 L2,9 Z" fill="#000"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="2048" height="1029"/>

  <!-- Lustre document -->
  <path d="M2 232
           L223 232
